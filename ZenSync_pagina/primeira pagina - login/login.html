<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZenSync | Login</title>

    <link rel="stylesheet" href="login.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

<main class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="imagem2/zensynclogo.png" alt="ZenSync Logo">
    </div>

    <!-- CARD DE LOGIN -->
    <section class="login-card">

        <span class="badge"></span>

        <h1>Bem-vindo</h1>

        <p class="subtext">
            Promovendo o bem-estar corporativo para equipes mais saudáveis e produtivas.
        </p>

        <!-- FORMULÁRIO -->
        <form action="home.html" method="GET">

            <!-- EMAIL -->
            <label for="email">E-mail corporativo</label>

            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="seu@email.com"
                    required
                    autocomplete="email">
            </div>

            <!-- SENHA -->
            <label for="senha">Senha</label>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Digite sua senha"
                    required>
            </div>

            <!-- BOTÃO LOGIN -->
            <button class="btn-login" type="submit">
                Entrar
            </button>

        </form>

        <!-- ESQUECI SENHA -->
        <a href="#" class="forgot">
            Esqueci minha senha
        </a>

        <!-- DIVISOR -->
        <div class="divider">
            <span>ou</span>
        </div>

        <!-- LOGIN GOOGLE -->
        <button class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar com Google
        </button>

        <!-- CADASTRO -->
        <p class="signup">
            Não possui acesso?
            <a href="#">Criar uma conta</a>
        </p>

    </section>

</main>

<!-- FONT AWESOME -->
<script src="https://kit.fontawesome.com/5f3b4b74f7.js" crossorigin="anonymous"></script>

<!-- VALIDAÇÃO PERSONALIZADA DO EMAIL -->
<script>
const email = document.getElementById("email");

email.addEventListener("invalid", function () {

    if (email.validity.valueMissing) {
        email.setCustomValidity("Informe seu e-mail corporativo.");
    } 
    else if (email.validity.typeMismatch) {
        email.setCustomValidity("Digite um e-mail válido. Exemplo: nome@empresa.com");
    } 
    else {
        email.setCustomValidity("");
    }

});

email.addEventListener("input", function () {
    email.setCustomValidity("");
});
</script>

</body>
</html>
